name: CI-CD Pipeline

on:
  push:
    branches: ["main"]

jobs:

# -------------------------
# 1. BUILD + TEST (CLOUD)
# -------------------------
  build-test:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout code
      # -------------------------
      - name: Checkout code
        uses: actions/checkout@v3

      # -------------------------
      # Setup Python
      # -------------------------
      - name: Setup Python
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      # -------------------------
      # Setup test environment
      # -------------------------
      - name: Setup test environment
        run: |
          mkdir -p logs database

          # Create DB
          python - <<EOF
import sqlite3
conn = sqlite3.connect("database/test.db")
conn.execute("CREATE TABLE IF NOT EXISTS test (id INTEGER)")
conn.close()
EOF

          # Create logs
          echo "INFO: App started" > logs/app.log
          echo "ERROR: connection refused to DB" >> logs/app.log

      # -------------------------
      # Run Tests
      # -------------------------
      - name: Run tests
        run: |
          source venv/bin/activate
          pytest

      # -------------------------
      # Build Artifact
      # -------------------------
      - name: Create artifact
        run: |
          mkdir -p build
          cp -r app.py routes services utils logs database dummy_service.py requirements.txt build/
          tar -czf incident-api.tar.gz build/

      # -------------------------
      # Upload Artifact
      # -------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: incident-api
          path: incident-api.tar.gz


# -------------------------
# 2. DEPLOY (SELF-HOSTED)
# -------------------------
  deploy:
    needs: build-test
    runs-on: self-hosted

    steps:
      # -------------------------
      # Download Artifact
      # -------------------------
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: incident-api

      # -------------------------
      # Deploy Application
      # -------------------------
      - name: Deploy application
        run: |
          mkdir -p ~/deployments
          cd ~/deployments

          rm -rf current
          mkdir current

          tar -xzf incident-api.tar.gz -C current --strip-components=1

      # -------------------------
      # Restart Application
      # -------------------------
      - name: Restart application
        run: |
          pkill -f "python app.py" || true
          cd ~/deployments/current
          nohup python app.py > output.log 2>&1 &

      # -------------------------
      # Health Check
      # -------------------------
      - name: Health check
        run: |
          sleep 3
          curl http://localhost:8000/health/app