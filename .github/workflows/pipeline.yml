name: CI-CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

# -------------------------
# 1. BUILD + TEST (CLOUD)
# -------------------------
  build-test:
    runs-on: ubuntu-latest
    env:
      API_SECRET_KEY: ${{ secrets.API_SECRET_KEY || 'test-secret-key' }}

    steps:
      # Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # Setup Python
      - name: Setup Python
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      # Setup environment (DB + logs)
      - name: Setup test environment
        run: |
          mkdir -p logs database

          python -c "import sqlite3; conn=sqlite3.connect('database/test.db'); conn.execute('CREATE TABLE IF NOT EXISTS test (id INTEGER)'); conn.close()"

          echo "INFO: App started" > logs/app.log
          echo "ERROR: connection refused to DB" >> logs/app.log

      # Run tests
      - name: Run tests
        run: |
          source venv/bin/activate
          pytest

      # Build artifact
      - name: Create artifact
        run: |
          mkdir -p build
          cp -r app.py routes services utils logs database dummy_service.py requirements.txt build/
          tar -czf incident-api.tar.gz build/

      # Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: incident-api
          path: incident-api.tar.gz


# -------------------------
# 2. DEPLOY (SELF-HOSTED)
# -------------------------
  deploy:
    needs: build-test
    runs-on: self-hosted
    env:
      API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}

    steps:
      # Download artifact to workspace
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: incident-api
          path: ${{ github.workspace }}

      # Debug (SAFE to keep for now)
      - name: Debug artifact location
        run: |
          echo "Workspace:"
          pwd
          echo "Listing files:"
          ls -la

      # Deploy
      - name: Deploy application
        run: |
          mkdir -p ~/deployments/current

          rm -rf ~/deployments/current/*
          
          tar -xzf ${{ github.workspace }}/incident-api.tar.gz \
            -C ~/deployments/current \
            --strip-components=1

      # Ensure deployment secret exists
      - name: Validate API secret
        run: |
          if [ -z "$API_SECRET_KEY" ]; then
            echo "ERROR: API_SECRET_KEY is not configured in GitHub Secrets"
            exit 1
          fi

      # Install runtime dependencies
      - name: Install dependencies
        run: |
          cd ~/deployments/current
          python3 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      # Restart app
      - name: Restart application
        run: |
          pkill -f "python app.py" || true
          cd ~/deployments/current
          source .venv/bin/activate
          nohup env API_SECRET_KEY="$API_SECRET_KEY" python app.py > output.log 2>&1 &

      # Health check
      - name: Health check
        run: |
          for i in {1..10}; do
            if curl -fsS http://localhost:8000/health/app; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for app startup... attempt $i/10"
            sleep 3
          done

          echo "Health check failed. Last 100 lines of output.log:"
          tail -n 100 ~/deployments/current/output.log || true
          exit 1
